<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>懂才抱．股票資訊整合系統</title>

  <meta name="description" content="客製化的股票資訊整合平台">
  <meta name="keyword" content="股票,財報狗,資訊整合平台">
  <meta name="author" content="小炫">

  <link rel="stylesheet" href="css/background_integration.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>
  <h1>輸入股票代碼</h1>

  <input id="symbolInput" type="text" placeholder="例如：HIMS 或 NVDA" />
  <button id="fetchBtn">產生公司介紹</button>

  <p id="usageInfo"></p>
  <p id="debug"></p>

  <div id="result"></div>
  <div id="chatContainer" style="display:none; margin-top: 30px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; background: rgba(255,255,255,0.05);">
  <h3 style="color: #8b5cf6;">深度追問 AI 分析師</h3>
  <div id="chatHistory" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px; font-size: 14px;"></div>
  
  <div style="display: flex; gap: 10px;">
    <input id="chatInput" type="text" placeholder="詢問更多關於此公司的細節..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; color: #000;">
    <button id="sendChatBtn" class="dc-btn-primary">提問</button>
  </div>
</div>

  <div id="planModal" class="dc-modal">
    <div class="dc-modal-backdrop" id="planModalBackdrop"></div>
    <div class="dc-modal-content">
      <h3>已達本週使用上限</h3>
      <p id="planModalMessage"></p>
      <div class="dc-modal-actions">
        <button id="planModalClose" class="dc-btn-primary">知道了</button>
      </div>
    </div>
  </div>

  <script>
  const BACKEND_URL = "https://dongcaibao.onrender.com/api/analyze-stock";

  const supabaseUrl = "https://zlkexplsleznuebighte.supabase.co";
  const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsa2V4cGxzbGV6bnVlYmlnaHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MzAwNjUsImV4cCI6MjA4MTAwNjA2NX0.HPVn3jcN88M4U3-RCVW-YO-b65rDOKv6pxEaVWwbm68";
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
  let currentSearchContext = "";
  let currentSymbol = "";
  
  const PLAN_LIMIT = {
    free: 2,
    plus: 10,
    pro: Infinity
  };

  const planModal = document.getElementById("planModal");
  const planModalBackdrop = document.getElementById("planModalBackdrop");
  const planModalClose = document.getElementById("planModalClose");
  const planModalMessage = document.getElementById("planModalMessage");

  function showPlanModal(message) {
    planModalMessage.textContent = message;
    planModal.classList.add("show");
  }

  function hidePlanModal() {
    planModal.classList.remove("show");
  }

  planModalClose.addEventListener("click", hidePlanModal);
  planModalBackdrop.addEventListener("click", hidePlanModal);

  async function getCurrentUserPlan() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return { user: null, plan: null };

    const { data: profile } = await supabaseClient
      .from("profiles")
      .select("plan")
      .eq("id", user.id)
      .maybeSingle();

    return { user, plan: profile?.plan || "free" };
  }

  async function getWeeklyUsage(userId) {
    const startOfWeek = new Date();
    startOfWeek.setHours(0, 0, 0, 0);
    startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

    const { count, error } = await supabaseClient
      .from("usage_logs")
      .select("*", { count: 'exact', head: true })
      .eq("user_id", userId)
      .eq("action", "company_intro")
      .gte("created_at", startOfWeek.toISOString());

    return error ? 0 : count;
  }

  async function updateUsageInfo(user, plan) {
    const usageInfoEl = document.getElementById("usageInfo");
    if (!usageInfoEl || !user) return;

    const startOfWeek = new Date();
    startOfWeek.setHours(0, 0, 0, 0);
    startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

    const limit = PLAN_LIMIT[plan] ?? PLAN_LIMIT["free"];
    const limitText = limit === Infinity ? "無限" : limit;
    
    const used = await getWeeklyUsage(user.id);

    const { count: chatUsed } = await supabaseClient
      .from("usage_logs")
      .select("*", { count: 'exact', head: true })
      .eq("user_id", user.id)
      .eq("action", "chat_query")
      .gte("created_at", startOfWeek.toISOString());

    const chatLimit = (plan === 'pro') ? "無限" : (plan === 'plus' ? 20 : 5);
    
    usageInfoEl.innerHTML = `
      目前方案：<span class="plan-tag plan-${plan}">${plan}</span> 
      ｜ 本週報告：${used} / ${limitText} 次
      <br>💬 本週對話：${chatUsed || 0} / ${chatLimit} 次
    `;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const { user, plan } = await getCurrentUserPlan();
    await updateUsageInfo(user, plan);
  });

  document.getElementById("fetchBtn").addEventListener("click", async () => {
    const debugEl = document.getElementById("debug");
    const resultEl = document.getElementById("result");
    const symbolInput = document.getElementById("symbolInput");
    const fetchBtn = document.getElementById("fetchBtn");
    
    const symbol = symbolInput.value.trim().toUpperCase();
    if (!symbol) {
      alert("請輸入股票代碼！");
      return;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      alert("請先登入才能使用產生公司介紹功能。");
      return;
    }

    
    fetchBtn.disabled = true;
    fetchBtn.textContent = "正在分析數據...";
    debugEl.textContent = "查詢中…正在分析數據...";
    resultEl.innerHTML = "<p>正在生成公司報告，請稍候...(約 30-45 秒)</p>";

    try {
      const response = await fetch(BACKEND_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ symbol: symbol })
      });

      const data = await response.json();

      if (!response.ok) {
        if (response.status === 403) {
          showPlanModal(data.error || "已達本週使用上限，請升級方案。");
          debugEl.textContent = "已達使用上限 ⛔";
          resultEl.innerHTML = "";
          return;
        }
        throw new Error(data.error || "伺服器發生錯誤");
      }
      
      const resultElement = document.getElementById("result");

      if (data.plan === 'pro') {
          resultElement.classList.add("pro-report-style");
      } else {
          resultElement.classList.remove("pro-report-style");
      }

   
      const htmlContent = marked.parse(data.text);
      
     
      const chartHtml = `
        <div style="height:450px; margin-bottom:25px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
          <iframe 
            src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=dark&style=1&timezone=Asia%2FTaipei" 
            width="100%" height="100%" frameborder="0" allowfullscreen>
          </iframe>
        </div>`;

    
      resultElement.innerHTML = chartHtml + htmlContent;

     
      currentSearchContext = data.searchContext; 
      currentSymbol = symbol;
      document.getElementById("chatContainer").style.display = "block";
      document.getElementById("chatHistory").innerHTML = "";

      debugEl.textContent = "查詢完成 ✔";

      const { user, plan } = await getCurrentUserPlan();
      await updateUsageInfo(user, plan);

    } catch (err) {
      console.error(err);
      debugEl.textContent = "錯誤：" + err.message;
      resultEl.innerHTML = `<p style='color:red'>發生錯誤，請確認後端是否已啟動。</p>`;
    } finally {
    
      fetchBtn.disabled = false;
      fetchBtn.textContent = "產生公司介紹";
    }
  });

  document.getElementById("sendChatBtn").addEventListener("click", async () => {
    const chatInput = document.getElementById("chatInput");
    const chatHistory = document.getElementById("chatHistory");
    const userQuery = chatInput.value.trim();

    if (!userQuery) return;

    chatHistory.innerHTML += `<div style="margin-bottom:10px; color:#fff;"><strong>👤 您：</strong>${userQuery}</div>`;
    chatInput.value = "";

    const aiMsgId = "ai-" + Date.now();
    chatHistory.innerHTML += `
      <div style="margin-bottom:20px; padding-left:10px; border-left:3px solid #8b5cf6; color:#ede7f3;">
        <strong>🤖 AI：</strong><br><span id="${aiMsgId}">正在思考中...</span>
      </div>
    `;
    const aiDisplayEl = document.getElementById(aiMsgId);
    chatHistory.scrollTop = chatHistory.scrollHeight;

    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      const response = await fetch("https://dongcaibao.onrender.com/api/chat-with-report", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({
          symbol: currentSymbol,
          searchContext: currentSearchContext,
          userQuery: userQuery
        })
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || "對話失敗");
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullContent = "";
      aiDisplayEl.innerHTML = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        fullContent += chunk;
        
        aiDisplayEl.innerHTML = marked.parse(fullContent);
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }

      const { user, plan } = await getCurrentUserPlan();
      await updateUsageInfo(user, plan);

    } catch (err) {
      console.error(err);
      aiDisplayEl.innerHTML = `<span style="color:red;">錯誤：${err.message}</span>`;
    }
  });
</script>
</body>
</html>
