  function showPlanModal(message) {

    planModal.classList.add("show");
  }

  function hidePlanModal() {
    planModal.classList.remove("show");
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function normalizeValueChainItems(items) {
    if (!Array.isArray(items)) return [];
    return items
      .map(item => String(item || "").trim())
      .filter(Boolean)
      .slice(0, 3);
  }

  function extractValueChain(responseText) {
    const text = String(responseText || "");
    const startMarker = "<" + "!-- VALUE_CHAIN_START --" + ">";
    const endMarker = "<" + "!-- VALUE_CHAIN_END --" + ">";
    const startIndex = text.indexOf(startMarker);
    const endIndex = text.indexOf(endMarker, startIndex + startMarker.length);

    if (startIndex === -1 || endIndex === -1) {
      return { valueChain: null, reportText: responseText };
    }

    const rawBlockEnd = endIndex + endMarker.length;
    const rawJsonBlock = text.slice(startIndex + startMarker.length, endIndex);
    const reportText = (text.slice(0, startIndex) + text.slice(rawBlockEnd)).trim();

    try {
      const rawJson = rawJsonBlock
        .replace(/^```(?:json)?\s*/i, "")
        .replace(/\s*```$/i, "")
        .trim();
      const parsed = JSON.parse(rawJson);
      const valueChain = {
        company: String(parsed.company || "").trim(),
        position: String(parsed.position || "").trim(),
        upstream: normalizeValueChainItems(parsed.upstream),
        offerings: normalizeValueChainItems(parsed.offerings),
        customers: normalizeValueChainItems(parsed.customers),
        revenue: normalizeValueChainItems(parsed.revenue)
      };

      return { valueChain, reportText };
    } catch (error) {
      console.warn("價值鏈資料解析失敗，改用純文字報告。", error);
      return { valueChain: null, reportText: reportText.trim() };
    }
  }

  function extractTimeline(responseText) {
    const text = String(responseText || "");
    const startMarker = "<" + "!-- TIMELINE_START --" + ">";
    const endMarker = "<" + "!-- TIMELINE_END --" + ">";
    const startIndex = text.indexOf(startMarker);
    const endIndex = text.indexOf(endMarker, startIndex + startMarker.length);

    if (startIndex === -1 || endIndex === -1) {
      return { timeline: null, reportText: responseText };
    }

    const rawBlockEnd = endIndex + endMarker.length;
    const rawJsonBlock = text.slice(startIndex + startMarker.length, endIndex);
    const reportText = (text.slice(0, startIndex) + text.slice(rawBlockEnd)).trim();

    try {
      const rawJson = rawJsonBlock
        .replace(/^```(?:json)?\s*/i, "")
        .replace(/\s*```$/i, "")
        .trim();
      const parsed = JSON.parse(rawJson);
      const items = Array.isArray(parsed.items)
        ? parsed.items
            .map(item => ({
              period: String(item?.period || "").trim(),
              event: String(item?.event || "").trim(),
              impact: String(item?.impact || "").trim()
            }))
            .filter(item => item.period && item.event)
            .slice(0, 6)
        : [];

      return {
        timeline: items.length ? { items } : null,
        reportText
      };
    } catch (error) {
      console.warn("公司時間線資料解析失敗，改用純文字報告。", error);
      return { timeline: null, reportText: reportText.trim() };
    }
  }

  function extractCoreSummary(responseText) {
    const text = String(responseText || "");
    const startMarker = "<" + "!-- CORE_SUMMARY_START --" + ">";
    const endMarker = "<" + "!-- CORE_SUMMARY_END --" + ">";
    const startIndex = text.indexOf(startMarker);
    const endIndex = text.indexOf(endMarker, startIndex + startMarker.length);

    if (startIndex === -1 || endIndex === -1) {
      return { coreSummary: null, reportText: responseText };
    }

    const rawBlockEnd = endIndex + endMarker.length;
    const rawJsonBlock = text.slice(startIndex + startMarker.length, endIndex);
    const reportText = (text.slice(0, startIndex) + text.slice(rawBlockEnd)).trim();

    try {
      const rawJson = rawJsonBlock
        .replace(/^```(?:json)?\s*/i, "")
        .replace(/\s*```$/i, "")
        .trim();
      const parsed = JSON.parse(rawJson);
      const normalizeText = value => String(value || "未披露").trim() || "未披露";
      const focus = Array.isArray(parsed.focus)
        ? parsed.focus.map(normalizeText).filter(Boolean).slice(0, 4)
        : [];

      return {
        coreSummary: {
          company: normalizeText(parsed.company),
          identity: normalizeText(parsed.identity),
          problem: normalizeText(parsed.problem),
          revenue: normalizeText(parsed.revenue),
          edge: normalizeText(parsed.edge),
          momentum: normalizeText(parsed.momentum),
          pressure: normalizeText(parsed.pressure),
          focus: focus.length ? focus : ["未披露"]
        },
        reportText
      };
    } catch (error) {
      console.warn("核心摘要資料解析失敗，改用純文字報告。", error);
      return { coreSummary: null, reportText: reportText.trim() };
    }
  }

  function extractProductPortfolio(responseText) {
    const text = String(responseText || "");
    const startMarker = "<" + "!-- PRODUCT_PORTFOLIO_START --" + ">";
    const endMarker = "<" + "!-- PRODUCT_PORTFOLIO_END --" + ">";
    const startIndex = text.indexOf(startMarker);
    const endIndex = text.indexOf(endMarker, startIndex + startMarker.length);

    if (startIndex === -1 || endIndex === -1) {
      return { productPortfolio: null, reportText: responseText };
    }

    const rawBlockEnd = endIndex + endMarker.length;
    const rawJsonBlock = text.slice(startIndex + startMarker.length, endIndex);
    const reportText = (text.slice(0, startIndex) + text.slice(rawBlockEnd)).trim();

    try {
      const rawJson = rawJsonBlock
        .replace(/^```(?:json)?\s*/i, "")
        .replace(/\s*```$/i, "")
        .trim();
      const parsed = JSON.parse(rawJson);
      const normalizeText = value => String(value || "未披露").trim() || "未披露";
      const items = Array.isArray(parsed.items)
        ? parsed.items
            .map(item => ({
              area: normalizeText(item?.area),
              type: normalizeText(item?.type),
              examples: Array.isArray(item?.examples)
                ? item.examples.map(normalizeText).slice(0, 3)
                : ["未披露"],
              significance: normalizeText(item?.significance)
            }))
            .slice(0, 6)
        : [];

      return {
        productPortfolio: items.length
          ? { overview: normalizeText(parsed.overview), items }
          : null,
        reportText
      };
    } catch (error) {
      console.warn("產品組合資料解析失敗，改用純文字報告。", error);
      return { productPortfolio: null, reportText: reportText.trim() };
    }
  }

  function extractResearchDashboard(responseText) {
    const text = String(responseText || "");
    const startMarker = "<" + "!-- RESEARCH_DASHBOARD_START --" + ">";
    const endMarker = "<" + "!-- RESEARCH_DASHBOARD_END --" + ">";
    const startIndex = text.indexOf(startMarker);
    const endIndex = text.indexOf(endMarker, startIndex + startMarker.length);

    if (startIndex === -1 || endIndex === -1) {
      return { dashboard: null, reportText: responseText };
    }

    const rawBlockEnd = endIndex + endMarker.length;
    const rawJsonBlock = text.slice(startIndex + startMarker.length, endIndex);
    const reportText = (text.slice(0, startIndex) + text.slice(rawBlockEnd)).trim();

    try {
      const rawJson = rawJsonBlock
        .replace(/^```(?:json)?\s*/i, "")
        .replace(/\s*```$/i, "")
        .trim();
      return { dashboard: JSON.parse(rawJson), reportText };
    } catch (error) {
      console.warn("研究儀表板資料解析失敗，改用純文字報告。", error);
      return { dashboard: null, reportText: reportText.trim() };
    }
  }

  function safeText(value) {
    return String(value || "未披露").trim() || "未披露";
  }

  function safeItems(value, limit = 10) {
    return Array.isArray(value) ? value.slice(0, limit) : [];
  }

  function renderDashboardHeading(eyebrow, title, description) {
    return `
      <div class="research-panel__heading">
        <span>${escapeHtml(eyebrow)}</span>
        <h2>${escapeHtml(title)}</h2>
        ${description ? `<p>${escapeHtml(description)}</p>` : ""}
      </div>
    `;
  }

  function renderInfoCards(items, className = "") {
    return `
      <div class="research-card-grid ${className}">
        ${items.map((item, index) => `
          <article class="research-card">
            <span class="research-card__number">${String(index + 1).padStart(2, "0")}</span>
            <p class="research-card__label">${escapeHtml(item.label)}</p>
            <p class="research-card__text">${escapeHtml(safeText(item.text))}</p>
          </article>
        `).join("")}
      </div>
    `;
  }

  function renderDataTable(headers, rows) {
    if (!rows.length) return `<p class="research-empty">目前資料不足以判斷</p>`;
    return `
      <div class="research-table-wrap">
        <table class="research-table">
          <thead><tr>${headers.map(header => `<th>${escapeHtml(header)}</th>`).join("")}</tr></thead>
          <tbody>
            ${rows.map(row => `
              <tr>${row.map(cell => `<td>${escapeHtml(safeText(cell))}</td>`).join("")}</tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderResearchDashboard(dashboard, symbol) {

    const operating = dashboard.operatingModel || {};
    const revenue = dashboard.revenueModel || {};

        ${renderInfoCards([
          { label: "公司想做什麼", text: vision.goal },
          { label: "傳統痛點", text: vision.pain },
          { label: "降低門檻", text: vision.access },
          { label: "信任與便利", text: vision.trust }
        ])}
      </section>
    `;

    const operatingSteps = safeItems(operating.steps, 5);
    const operatingHtml = `
      <section class="research-panel research-panel--dark">
        ${renderDashboardHeading("OPERATING MODEL", `${symbol} 怎麼做生意？`, safeText(operating.overview))}
        <div class="process-flow">
          ${operatingSteps.map((item, index) => `
            <article class="process-flow__step">
              <div class="process-flow__index">${String(index + 1).padStart(2, "0")}</div>

              <p><strong>客戶優勢</strong>${escapeHtml(safeText(item.customerBenefit))}</p>

        <h3 class="research-subtitle">技術與營運效率</h3>
        ${renderInfoCards(
          safeItems(operating.capabilities, 8).map(item => ({

    const revenueHtml = `

          { label: "交叉銷售機會", text: revenue.crossSell }
        ], "research-card-grid--revenue")}
        <h3 class="research-subtitle">成本結構與毛利特性</h3>
        ${renderDataTable(
          ["成本要素", "優勢或壓力", "財務影響"],
          safeItems(revenue.costs, 8).map(item => [item.factor, item.advantageOrPressure, item.financialImpact])
        )}
      </section>
    `;

    const advantagesHtml = `
      <section class="research-panel research-panel--dark">
        ${renderDashboardHeading("COMPETITIVE MOAT", `${symbol} 憑什麼贏？`, "每項優勢都連結競爭差異、護城河類型與可驗證指標。")}
        <div class="moat-grid">
          ${safeItems(dashboard.advantages, 5).map(item => `
            <article class="moat-card">
              <div class="moat-card__top">
                <span>${escapeHtml(safeText(item.moatType))}</span>
                <h3>${escapeHtml(safeText(item.source))}</h3>
              </div>
              <p><strong>厲害在哪</strong>${escapeHtml(safeText(item.strength))}</p>
              <p><strong>競爭差異</strong>${escapeHtml(safeText(item.difference))}</p>
              <p class="moat-card__metric"><strong>追蹤指標</strong>${escapeHtml(safeText(item.metric))}</p>
            </article>
          `).join("")}
        </div>
      </section>
    `;

    const risksHtml = `
      <section class="research-panel research-panel--risk">
        ${renderDashboardHeading("RISK RADAR", `${symbol} 的潛在風險`, "從發生原因一路連結到財務影響與預警訊號。")}
        <div class="risk-grid">
          ${safeItems(dashboard.risks, 5).map((item, index) => `
            <article class="risk-card">
              <span class="risk-card__index">${String(index + 1).padStart(2, "0")}</span>
              <h3>${escapeHtml(safeText(item.risk))}</h3>
              <p><strong>發生原因</strong>${escapeHtml(safeText(item.cause))}</p>
              <p><strong>為何重要</strong>${escapeHtml(safeText(item.importance))}</p>
              <p><strong>影響指標</strong>${escapeHtml(safeText(item.affectedMetrics))}</p>
              <p><strong>追蹤方式</strong>${escapeHtml(safeText(item.monitoring))}</p>
            </article>
          `).join("")}
        </div>
      </section>
    `;

    const themes = safeItems(industry.themes, 8);
    const industryHtml = `
      <section class="research-panel research-panel--light">
        ${renderDashboardHeading("INDUSTRY LANDSCAPE", "產業位置與競爭", safeText(industry.overview))}
        ${renderInfoCards([
          { label: "成長原因與需求", text: industry.growthDrivers },
          { label: "滲透率與週期性", text: industry.penetrationCycle }
        ], "research-card-grid--two")}
        <div class="research-tags">${themes.map(item => `<span>${escapeHtml(safeText(item))}</span>`).join("")}</div>
        <h3 class="research-subtitle">競爭者威脅</h3>
        ${renderDataTable(
          ["競爭者", "定位", "優勢", "劣勢", "客群重疊度"],
          safeItems(industry.competitors, 8).map(item => [
            item.name, item.positioning, item.strength, item.weakness, item.overlap
          ])
        )}
        <h3 class="research-subtitle">產業順風與逆風</h3>
        <div class="wind-grid">
          ${safeItems(industry.winds, 6).map(item => {
            const isTailwind = safeText(item.type).includes("順");
            return `
              <article class="wind-card ${isTailwind ? "wind-card--tail" : "wind-card--head"}">
                <span>${escapeHtml(safeText(item.type))}</span>
                <h3>${escapeHtml(safeText(item.factor))}</h3>
                <p>${escapeHtml(safeText(item.companyImpact))}</p>
              </article>
            `;
          }).join("")}
        </div>
      </section>
    `;

    const financialsHtml = `
      <section class="research-panel research-panel--dark">
        ${renderDashboardHeading("FINANCIAL FUNDAMENTALS", "財務基本面分析", "不只看數字，也說明每項指標為什麼重要、接下來該看什麼。")}
        <div class="financial-grid">
          ${safeItems(dashboard.financials, 5).map(item => `
            <article class="financial-card">
              <h3>${escapeHtml(safeText(item.area))}</h3>
              <p class="financial-card__assessment">${escapeHtml(safeText(item.assessment))}</p>
              <p><strong>重要性</strong>${escapeHtml(safeText(item.importance))}</p>
              <p><strong>後續觀察</strong>${escapeHtml(safeText(item.watch))}</p>
            </article>
          `).join("")}
        </div>
      </section>
    `;

    const variablesHtml = `
      <section class="research-panel research-panel--light">
        ${renderDashboardHeading("KEY VARIABLES", "未來 1-3 年關鍵變數", "用正面與負面訊號驗證成長及競爭力是否延續。")}
        ${renderDataTable(
          ["關鍵變數", "為什麼重要", "正面訊號", "負面訊號"],

          ])
        )}
      </section>

    const governanceHtml = `

        ${renderInfoCards([
          { label: "領導與執行風格", text: governance.leadership },
          { label: "長期目標與策略", text: governance.strategy },
          { label: "主要風險應對", text: governance.riskResponse },
          { label: "治理觀察訊號", text: governance.signals }
        ])}
      </section>
    `;

    const researchHtml = `
      <section class="research-panel research-panel--light">
        ${renderDashboardHeading("RESEARCH PLAYBOOK", "分析與後續研究", "把公司研究轉成可持續驗證的問題、清單與財報閱讀框架。")}

          ${safeItems(research.questions, 5).map((item, index) => `
            <article class="question-card">
              <span>Q${index + 1}</span>
              <h3>${escapeHtml(safeText(item.question))}</h3>
              <p>${escapeHtml(safeText(item.importance))}</p>
            </article>
          `).join("")}
        </div>
        <h3 class="research-subtitle">後續追蹤清單</h3>
        ${renderDataTable(
          ["追蹤主題", "要看什麼", "為什麼重要"],
          safeItems(research.tracking, 10).map(item => [item.topic, item.watch, item.importance])
        )}
        <h3 class="research-subtitle">懂才抱財報閱讀指南</h3>
        <div class="metric-grid">
          ${safeItems(research.metrics, 10).map(item => `
            <article class="metric-card">
              <h3>${escapeHtml(safeText(item.metric))}</h3>
              <p>${escapeHtml(safeText(item.importance))}</p>
              <div><strong>關注方向</strong>${escapeHtml(safeText(item.direction))}</div>
            </article>
          `).join("")}
        </div>
      </section>
    `;

    const newsHtml = `
      <section class="research-panel research-panel--news">
        ${renderDashboardHeading("NEWS MONITORING", "關鍵新訊追蹤清單", `為 ${symbol} 建立五個自動化新聞監測維度。`)}
        <div class="news-monitor-grid">
          ${safeItems(dashboard.newsTags, 5).map((group, index) => `
            <article class="news-monitor-card">
              <span>${String(index + 1).padStart(2, "0")}</span>
              <h3>${escapeHtml(safeText(group.category))}</h3>

    `;

    return visionHtml + operatingHtml + revenueHtml + advantagesHtml + risksHtml +
      industryHtml + financialsHtml + variablesHtml + governanceHtml + researchHtml + newsHtml;
  }

  function findJsonObjectEnd(text, startIndex) {
    let depth = 0;
    let inString = false;
    let escaped = false;

    for (let index = startIndex; index < text.length; index += 1) {
      const char = text[index];

      if (inString) {
        if (escaped) {
          escaped = false;
        } else if (char === "\\") {
          escaped = true;
        } else if (char === '"') {
          inString = false;
        }
        continue;
      }

      if (char === '"') {
        inString = true;
      } else if (char === "{") {
        depth += 1;
      } else if (char === "}") {
        depth -= 1;
        if (depth === 0) return index + 1;
      }
    }

    return -1;
  }

  function formatUnexpectedOverviewJson(data) {
    if (!data || typeof data.overview !== "string" || !Array.isArray(data.items)) {
      return null;
    }

    const sections = data.items
      .map(item => {
        const area = String(item?.area || "").trim();
        const type = String(item?.type || "").trim();
        const examples = Array.isArray(item?.examples)
          ? item.examples.map(example => String(example || "").trim()).filter(Boolean)
          : [];
        const significance = String(item?.significance || "").trim();

        if (!area && !type && !examples.length && !significance) return "";

        const title = [area, type].filter(Boolean).join("｜") || "產品與服務";
        const lines = [`### ${title}`];
        if (examples.length) lines.push(`- **代表項目：** ${examples.join("、")}`);
        if (significance) lines.push(`- **對公司的意義：** ${significance}`);
        return lines.join("\n");
      })
      .filter(Boolean);

    return [
      "## 主要產品與服務",
      data.overview.trim(),
      ...sections
    ].filter(Boolean).join("\n\n");
  }

  function normalizeUnexpectedJson(responseText) {
    let text = String(responseText || "");
    let searchIndex = 0;

    while (searchIndex < text.length) {
      const startIndex = text.indexOf("{", searchIndex);
      if (startIndex === -1) break;

      const endIndex = findJsonObjectEnd(text, startIndex);
      if (endIndex === -1) break;

      const candidate = text.slice(startIndex, endIndex);

      try {
        const parsed = JSON.parse(candidate);
        const replacement = formatUnexpectedOverviewJson(parsed);

        if (replacement) {
          text = text.slice(0, startIndex) + replacement + text.slice(endIndex);
          searchIndex = startIndex + replacement.length;
          continue;
        }
      } catch (error) {
        // This brace belongs to normal report text, so continue searching.
      }

      searchIndex = startIndex + 1;
    }

    return text
      .replace(/```json\s*(?=\{)/gi, "")
      .replace(/(\})\s*```/g, "$1")
      .trim();
  }

  function renderValueChainList(items) {
    const safeItems = items.length ? items : ["未披露"];
    return `<ul>${safeItems.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
  }

  function renderValueChain(valueChain, fallbackSymbol) {
    if (!valueChain) return "";

    const company = valueChain.company || fallbackSymbol;
    const position = valueChain.position || "產業鏈定位未披露";

    return `
      <section class="value-chain" aria-labelledby="valueChainTitle">
        <div class="value-chain__heading">
          <span>BUSINESS MAP</span>
          <h2 id="valueChainTitle">商業模式與產業價值鏈</h2>
          <p>快速看懂公司從哪裡取得資源、提供什麼價值，以及向誰收費。</p>
        </div>

        <div class="value-chain__flow">
          <article class="value-chain__card">
            <div class="value-chain__icon" aria-hidden="true">01</div>
            <p class="value-chain__label">上游資源</p>
            ${renderValueChainList(valueChain.upstream)}
          </article>

          <div class="value-chain__arrow" aria-hidden="true">→</div>

          <article class="value-chain__card value-chain__card--company">
            <div class="value-chain__icon" aria-hidden="true">02</div>
            <p class="value-chain__label">核心公司</p>
            <h3>${escapeHtml(company)}</h3>
            <p class="value-chain__position">${escapeHtml(position)}</p>
            ${renderValueChainList(valueChain.offerings)}
          </article>

          <div class="value-chain__arrow" aria-hidden="true">→</div>

          <article class="value-chain__card">
            <div class="value-chain__icon" aria-hidden="true">03</div>
            <p class="value-chain__label">客戶與市場</p>
            ${renderValueChainList(valueChain.customers)}
          </article>
        </div>

        <div class="value-chain__revenue">
          <strong>收入來源</strong>
          <div>${valueChain.revenue.map(item => `<span>${escapeHtml(item)}</span>`).join("") || "<span>未披露</span>"}</div>
        </div>
      </section>
    `;
  }

  function renderTimeline(timeline) {
    if (!timeline?.items?.length) return "";

    const itemsHtml = timeline.items.map((item, index) => `
      <article class="company-timeline__item">
        <div class="company-timeline__marker" aria-hidden="true">
          <span>${String(index + 1).padStart(2, "0")}</span>
        </div>
        <div class="company-timeline__content">
          <p class="company-timeline__period">${escapeHtml(item.period)}</p>
          <h3>${escapeHtml(item.event)}</h3>
          ${item.impact ? `<p class="company-timeline__impact">${escapeHtml(item.impact)}</p>` : ""}
        </div>
      </article>
    `).join("");

    return `
      <section class="company-timeline" aria-labelledby="companyTimelineTitle">
        <div class="company-timeline__heading">
          <span>COMPANY JOURNEY</span>
          <h2 id="companyTimelineTitle">公司發展時間線</h2>
          <p>從關鍵節點看懂公司如何走到現在。</p>
        </div>
        <div class="company-timeline__track">
          ${itemsHtml}
        </div>
      </section>
    `;
  }

  function renderCoreSummary(coreSummary, fallbackSymbol) {
    if (!coreSummary) return "";

    const company = coreSummary.company === "未披露"
      ? fallbackSymbol
      : coreSummary.company;
    const cards = [
      ["01", "公司定位", coreSummary.identity],
      ["02", "解決痛點", coreSummary.problem],
      ["03", "收入引擎", coreSummary.revenue],
      ["04", "模式特色", coreSummary.edge]
    ];

    return `
      <section class="core-summary" aria-labelledby="coreSummaryTitle">
        <div class="core-summary__heading">
          <div>
            <span>INVESTMENT SNAPSHOT</span>
            <h2 id="coreSummaryTitle">${escapeHtml(company)} 核心摘要</h2>
          </div>
          <p>先用一張圖掌握公司如何創造價值，以及近期最該注意的變化。</p>
        </div>

        <div class="core-summary__grid">
          ${cards.map(([number, label, content]) => `
            <article class="core-summary__card">
              <span class="core-summary__number">${number}</span>
              <p class="core-summary__label">${label}</p>
              <p class="core-summary__text">${escapeHtml(content)}</p>
            </article>
          `).join("")}
        </div>

        <div class="core-summary__signals">
          <article class="core-summary__signal core-summary__signal--positive">
            <p class="core-summary__label">成長動能</p>
            <p>${escapeHtml(coreSummary.momentum)}</p>
          </article>
          <article class="core-summary__signal core-summary__signal--risk">
            <p class="core-summary__label">主要壓力</p>
            <p>${escapeHtml(coreSummary.pressure)}</p>
          </article>
        </div>

        <div class="core-summary__focus">
          <strong>後續研究焦點</strong>
          <div>${coreSummary.focus.map(item => `<span>${escapeHtml(item)}</span>`).join("")}</div>
        </div>
      </section>
    `;
  }

  function renderProductPortfolio(productPortfolio) {
    if (!productPortfolio?.items?.length) return "";

    const itemsHtml = productPortfolio.items.map((item, index) => `
      <article class="product-portfolio__card">
        <div class="product-portfolio__topline">
          <span>${String(index + 1).padStart(2, "0")}</span>
          <p>${escapeHtml(item.area)}</p>
        </div>
        <h3>${escapeHtml(item.type)}</h3>
        <div class="product-portfolio__examples">
          ${item.examples.map(example => `<span>${escapeHtml(example)}</span>`).join("")}
        </div>
        <div class="product-portfolio__meaning">
          <strong>對公司的意義</strong>
          <p>${escapeHtml(item.significance)}</p>
        </div>
      </article>
    `).join("");

    return `
      <section class="product-portfolio" aria-labelledby="productPortfolioTitle">
        <div class="product-portfolio__heading">
          <span>PRODUCT PORTFOLIO</span>
          <h2 id="productPortfolioTitle">主要產品與服務</h2>
          <p>${escapeHtml(productPortfolio.overview)}</p>
        </div>
        <div class="product-portfolio__grid">
          ${itemsHtml}
        </div>
      </section>
    `;
  }

  planModalClose.addEventListener("click", hidePlanModal);
  planModalBackdrop.addEventListener("click", hidePlanModal);

  async function getCurrentUserPlan() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return { user: null, plan: null };

    const { data: profile } = await supabaseClient
      .from("profiles")
      .select("plan")
      .eq("id", user.id)
      .maybeSingle();

    return { user, plan: profile?.plan || "free" };
  }

  async function getWeeklyUsage(userId) {
    const startOfWeek = new Date();
    startOfWeek.setHours(0, 0, 0, 0);
    startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

    const { count, error } = await supabaseClient
      .from("usage_logs")
      .select("*", { count: 'exact', head: true })
      .eq("user_id", userId)
      .eq("action", "company_intro")
      .gte("created_at", startOfWeek.toISOString());

    return error ? 0 : count;
  }

  async function updateUsageInfo(user, plan) {
    const usageInfoEl = document.getElementById("usageInfo");
    if (!usageInfoEl || !user) return;

    const startOfWeek = new Date();
    startOfWeek.setHours(0, 0, 0, 0);
    startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

    const limit = PLAN_LIMIT[plan] ?? PLAN_LIMIT["free"];
    const limitText = limit === Infinity ? "無限" : limit;
    
    const used = await getWeeklyUsage(user.id);

    const { count: chatUsed } = await supabaseClient
      .from("usage_logs")
      .select("*", { count: 'exact', head: true })
      .eq("user_id", user.id)
      .eq("action", "chat_query")
      .gte("created_at", startOfWeek.toISOString());

    const chatLimit = (plan === 'pro') ? "無限" : (plan === 'plus' ? 20 : 5);
    
    usageInfoEl.innerHTML = `
      目前方案：<span class="plan-tag plan-${plan}">${plan}</span> 
      ｜ 本週報告：${used} / ${limitText} 次
      <br>💬 本週對話：${chatUsed || 0} / ${chatLimit} 次
    `;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const { user, plan } = await getCurrentUserPlan();
    await updateUsageInfo(user, plan);
  });

  document.getElementById("fetchBtn").addEventListener("click", async () => {
    const debugEl = document.getElementById("debug");
    const resultEl = document.getElementById("result");
    const symbolInput = document.getElementById("symbolInput");
    const fetchBtn = document.getElementById("fetchBtn");
    
    const symbol = symbolInput.value.trim().toUpperCase();
    if (!symbol) {
      alert("請輸入股票代碼！");
      return;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      alert("請先登入才能使用產生公司介紹功能。");
      return;
    }

    
    fetchBtn.disabled = true;
    fetchBtn.textContent = "正在分析數據...";
    debugEl.textContent = "查詢中…正在分析數據...";
    resultEl.innerHTML = "<p>正在生成公司報告，請稍候...(約 30-45 秒)</p>";

    try {
      const response = await fetch(BACKEND_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ symbol: symbol })
      });

      const data = await response.json();

      if (!response.ok) {
        if (response.status === 403) {
          showPlanModal(data.error || "已達本週使用上限，請升級方案。");
          debugEl.textContent = "已達使用上限 ⛔";
          resultEl.innerHTML = "";
          return;
        }
        throw new Error(data.error || "伺服器發生錯誤");
      }
      
      const resultElement = document.getElementById("result");

      if (data.plan === 'pro') {
          resultElement.classList.add("pro-report-style");
      } else {
          resultElement.classList.remove("pro-report-style");
      }

   
      const { valueChain, reportText: reportWithoutValueChain } = extractValueChain(data.text);
      const { timeline, reportText: reportWithoutTimeline } = extractTimeline(reportWithoutValueChain);
      const { coreSummary, reportText: reportWithoutCoreSummary } = extractCoreSummary(reportWithoutTimeline);
      const { productPortfolio, reportText: reportWithoutProductPortfolio } = extractProductPortfolio(reportWithoutCoreSummary);
      const { dashboard, reportText: reportWithoutDashboard } = extractResearchDashboard(reportWithoutProductPortfolio);
      const reportText = normalizeUnexpectedJson(reportWithoutDashboard);
      const valueChainHtml = renderValueChain(valueChain, symbol);
      const timelineHtml = renderTimeline(timeline);
      const coreSummaryHtml = renderCoreSummary(coreSummary, symbol);
      const productPortfolioHtml = renderProductPortfolio(productPortfolio);
      const dashboardHtml = renderResearchDashboard(dashboard, symbol);
      const htmlContent = marked.parse(reportText);
      
     
      const chartHtml = `
        <div style="height:450px; margin-bottom:25px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
          <iframe 
            src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=dark&style=1&timezone=Asia%2FTaipei" 
            width="100%" height="100%" frameborder="0" allowfullscreen>
          </iframe>
        </div>`;

    
      resultElement.innerHTML = chartHtml + valueChainHtml + timelineHtml + coreSummaryHtml +
        productPortfolioHtml + dashboardHtml + htmlContent;

     
      currentSearchContext = data.searchContext; 
      currentSymbol = symbol;
      document.getElementById("chatContainer").style.display = "block";
      document.getElementById("chatHistory").innerHTML = "";

      debugEl.textContent = "查詢完成 ✔";

      const { user, plan } = await getCurrentUserPlan();
      await updateUsageInfo(user, plan);

    } catch (err) {
      console.error(err);
      debugEl.textContent = "錯誤：" + err.message;
      resultEl.innerHTML = `<p style='color:red'>發生錯誤，請確認後端是否已啟動。</p>`;
    } finally {
    
      fetchBtn.disabled = false;
      fetchBtn.textContent = "產生公司介紹";
    }
  });

  document.getElementById("sendChatBtn").addEventListener("click", async () => {
    const chatInput = document.getElementById("chatInput");
    const chatHistory = document.getElementById("chatHistory");
    const userQuery = chatInput.value.trim();

    if (!userQuery) return;

    chatHistory.innerHTML += `<div style="margin-bottom:10px; color:#fff;"><strong>👤 您：</strong>${userQuery}</div>`;
    chatInput.value = "";

    const aiMsgId = "ai-" + Date.now();
    chatHistory.innerHTML += `
      <div style="margin-bottom:20px; padding-left:10px; border-left:3px solid #8b5cf6; color:#ede7f3;">
        <strong>🤖 AI：</strong><br><span id="${aiMsgId}">正在思考中...</span>
      </div>
    `;
    const aiDisplayEl = document.getElementById(aiMsgId);
    chatHistory.scrollTop = chatHistory.scrollHeight;

    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      const response = await fetch("https://dongcaibao.onrender.com/api/chat-with-report", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({
          symbol: currentSymbol,
          searchContext: currentSearchContext,
          userQuery: userQuery
        })
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || "對話失敗");
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullContent = "";
      aiDisplayEl.innerHTML = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        fullContent += chunk;
        
        aiDisplayEl.innerHTML = marked.parse(fullContent);
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }

      const { user, plan } = await getCurrentUserPlan();
      await updateUsageInfo(user, plan);

    } catch (err) {
      console.error(err);
      aiDisplayEl.innerHTML = `<span style="color:red;">錯誤：${err.message}</span>`;
    }
  });
</script>
