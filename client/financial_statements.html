<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>懂才抱｜財報追蹤管理</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: #f3f4f6;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: #111827;
      color: #e5e7eb;
      padding: 24px;
    }
    .sidebar h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }
    .sidebar .plan {
      font-size: 14px;
      margin-bottom: 16px;
    }
    .sidebar label {
      font-size: 14px;
      display: block;
      margin: 12px 0 4px;
    }
    .sidebar input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #111827;
      color: #f9fafb;
      box-sizing: border-box;
    }
    .sidebar button {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #4f46e5;
      color: #f9fafb;
      font-size: 14px;
      width: 100%;
    }
    .sidebar button:disabled {
      background: #6b7280;
      cursor: not-allowed;
    }
    .stock-list {
      margin-top: 16px;
      font-size: 14px;
    }
    .stock-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .stock-item:hover {
      background: #1f2937;
    }
    .stock-item.active {
      background: #1f2937;
      border-color: #4f46e5;
    }
    .stock-item .status-tag {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      margin-left: 6px;
      background: #374151;
      color: #d1d5db;
    }
    .stock-item button {
      padding: 2px 8px;
      font-size: 12px;
      background: #b91c1c;
      width: auto;
    }

    .content {
      padding: 24px;
      overflow-y: auto;
    }
    .dashboards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .dash-card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 24px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.06);
      min-height: 500px;
    }
    .dash-card h2 {
      font-size: 20px;
      margin: 0 0 16px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 12px;
    }
    
    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 10px;
    }
    .tab-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background: white;
      color: #374151;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background: #f9fafb;
    }
    .tab-btn.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }

    .view-section {
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }
    .view-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 8px;
      background: #f9fafb;
    }

    .report-deck {
      --deck-accent: #4f46e5;
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #0f172a;
      color: #f8fafc;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
    }
    .report-slide {
      display: none;
      grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
      min-height: 520px;
      animation: slideReveal 0.35s ease;
    }
    .report-slide.active {
      display: grid;
    }
    .report-slide-copy {
      padding: 54px 48px 82px;
      background:
        radial-gradient(circle at 15% 10%, rgba(99,102,241,.22), transparent 35%),
        linear-gradient(145deg, #111827, #0f172a);
    }
    .report-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 26px;
      color: #c7d2fe;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .report-kicker::before {
      content: "";
      width: 28px;
      height: 2px;
      background: #818cf8;
    }
    .report-slide h3 {
      margin: 0 0 24px;
      color: #ffffff;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.18;
      letter-spacing: -.03em;
    }
    .report-slide-body {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.85;
    }
    .report-slide-body p {
      margin: 0 0 16px;
    }
    .report-slide-body ul,
    .report-slide-body ol {
      margin: 0;
      padding-left: 22px;
    }
    .report-slide-body li {
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .report-slide-body li::marker {
      color: #818cf8;
    }
    .report-slide-body strong {
      color: #ffffff;
    }
    .report-visual {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 360px;
      padding: 34px;
      overflow: hidden;
      background: linear-gradient(145deg, #e0e7ff, #f8fafc 55%, #dbeafe);
    }
    .report-visual::before,
    .report-visual::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(79, 70, 229, .1);
    }
    .report-visual::before {
      width: 260px;
      height: 260px;
      right: -90px;
      top: -80px;
    }
    .report-visual::after {
      width: 180px;
      height: 180px;
      left: -70px;
      bottom: -70px;
    }
    .report-visual svg {
      position: relative;
      z-index: 1;
      width: min(100%, 360px);
      height: auto;
      filter: drop-shadow(0 20px 22px rgba(30, 41, 59, .16));
    }
    .report-deck-controls {
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 28px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }
    .report-deck-nav,
    .report-deck-dots {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }
    .report-deck button {
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(15,23,42,.72);
      color: #ffffff;
      cursor: pointer;
    }
    .report-nav-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 18px;
    }
    .report-nav-btn:disabled {
      opacity: .35;
      cursor: default;
    }
    .report-dot {
      width: 8px;
      height: 8px;
      padding: 0;
      border-radius: 999px;
      transition: width .2s, background .2s;
    }
    .report-dot.active {
      width: 25px;
      background: #818cf8;
    }
    .report-page {
      color: #cbd5e1;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .report-empty {
      padding: 60px 30px;
      border-radius: 16px;
      background: #f8fafc;
      color: #64748b;
      text-align: center;
    }

    @keyframes slideReveal {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      margin-bottom: 10px;
    }
    .status-badge.pending {
      background: #fff7ed;
      color: #c2410c;
    }

@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr; 
    display: block;
  }
  .sidebar {
    padding: 16px;
    border-bottom: 4px solid #4f46e5;
  }
  .stock-list {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .stock-item {
    flex: 0 0 auto;
    margin-bottom: 0;
    min-width: 120px;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px;
  }
  .stock-item button {
    margin-top: 8px;
    width: 100%;
  }
  .content {
    padding: 12px;
  }
  .dash-card {
    padding: 16px;
    min-height: auto;
  }
  .tab-container {
    flex-direction: column;
  }
  .tab-btn {
    width: 100%;
    text-align: center;
    padding: 12px;
    font-size: 16px;
  }
  iframe {
    height: 500px;
  }
  .report-slide,
  .report-slide.active {
    grid-template-columns: 1fr;
  }
  .report-slide-copy {
    min-height: 390px;
    padding: 36px 24px 88px;
  }
  .report-slide h3 {
    font-size: 28px;
  }
  .report-slide-body {
    font-size: 15px;
  }
  .report-visual {
    min-height: 260px;
    padding: 24px;
  }
  .report-visual svg {
    max-height: 230px;
  }
  .report-deck-controls {
    left: 24px;
    right: 24px;
    bottom: 24px;
  }
}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>財報追蹤管理</h1>
    <div class="plan">
      目前方案：<span id="planName">載入中...</span><br>
      可追蹤檔數上限：<span id="planLimit">-</span> 檔
    </div>

    <label for="symbolInput">新增追蹤股票（美股代號，例如 HIMS）</label>
    <input id="symbolInput" placeholder="輸入股票代號（英文）" />
    <button id="addBtn">新增追蹤</button>
    <div style="font-size:12px; margin-top:4px; color:#9ca3af;">Free: 1 檔、Plus: 3 檔、Pro: 5 檔</div>

    <div class="stock-list" id="stockList"></div>
  </aside>

  <main class="content">
    <div class="dashboards" id="dashboards"></div>
  </main>
</div>

<script>
  const supabaseUrl = "https://zlkexplsleznuebighte.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsa2V4cGxzbGV6bnVlYmlnaHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MzAwNjUsImV4cCI6MjA4MTAwNjA2NX0.HPVn3jcN88M4U3-RCVW-YO-b65rDOKv6pxEaVWwbm68";
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const planLimitMap = { free: 1, plus: 3, pro: 5 };

  let currentUser = null;
  let currentPlan = "free";
  let currentLimit = 1;
  let tracked = [];
  let selectedStockId = null;

  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      alert("請先登入後再使用財報追蹤功能");
      return;
    }
    currentUser = session.user;

    const { data: profile, error } = await supabaseClient
      .from("profiles")
      .select("plan")
      .eq("id", currentUser.id)
      .single();

    if (error) {
      console.error("讀取 profile 失敗，使用預設值");
      currentPlan = "free";
    } else {
      currentPlan = profile.plan || "free";
    }
    currentLimit = planLimitMap[currentPlan] || 1;

    document.getElementById("planName").textContent = currentPlan.toUpperCase();
    document.getElementById("planLimit").textContent = currentLimit;

    await loadTrackedStocks();
  }

  async function loadTrackedStocks() {
    const { data, error } = await supabaseClient
      .from("tracked_stocks")
      .select("id, symbol, status, report_url, summary")
      .eq("user_id", currentUser.id)
      .order("created_at", { ascending: true });

    if (error) {
      console.error("讀取追蹤股票失敗：", error);
      return;
    }

    tracked = data || [];

    if (tracked.length > 0) {
      if (!selectedStockId || !tracked.some(s => s.id === selectedStockId)) {
        selectedStockId = tracked[0].id;
      }
    } else {
      selectedStockId = null;
    }

    renderStockList();
    renderDashboards();
    updateAddButtonState();
  }

  function renderStockList() {
    const listEl = document.getElementById("stockList");
    if (tracked.length === 0) {
      listEl.innerHTML = "<div style='padding:10px; color:#9ca3af;'>尚未追蹤任何股票</div>";
      return;
    }
    listEl.innerHTML = tracked
      .map(s => {
        let statusText = s.status === "ready" ? "已完成" : s.status === "review" ? "審核中" : "準備中";
        const activeClass = s.id === selectedStockId ? "active" : "";

        return `
          <div class="stock-item ${activeClass}" onclick="selectStock(${s.id})">
            <span>
              ${s.symbol}
              <span class="status-tag">${statusText}</span>
            </span>
            <button onclick="event.stopPropagation(); removeStock(${s.id})">移除</button>
          </div>
        `;
      })
      .join("");
  }

  function selectStock(id) {
    selectedStockId = id;
    renderStockList();
    renderDashboards();
  }

  window.switchView = function(viewName) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${viewName}`).classList.add('active');

    document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(`view-${viewName}`).classList.add('active');
  }

  function getReportIllustration(index) {
    const illustrations = [
      `<svg viewBox="0 0 420 320" role="img" aria-label="官方財報摘要插圖">
        <rect x="72" y="36" width="276" height="246" rx="24" fill="#fff"/>
        <rect x="102" y="72" width="118" height="16" rx="8" fill="#c7d2fe"/>
        <rect x="102" y="104" width="216" height="10" rx="5" fill="#e2e8f0"/>
        <rect x="102" y="126" width="178" height="10" rx="5" fill="#e2e8f0"/>
        <path d="M110 226 L156 188 L198 208 L252 142 L310 174" fill="none" stroke="#4f46e5" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="252" cy="142" r="12" fill="#818cf8"/>
      </svg>`,
      `<svg viewBox="0 0 420 320" role="img" aria-label="業務發展插圖">
        <circle cx="210" cy="160" r="112" fill="#fff"/>
        <rect x="116" y="174" width="48" height="72" rx="12" fill="#c7d2fe"/>
        <rect x="186" y="132" width="48" height="114" rx="12" fill="#818cf8"/>
        <rect x="256" y="88" width="48" height="158" rx="12" fill="#4f46e5"/>
        <path d="M124 128 C178 114 224 88 292 48" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>
        <path d="M267 47 L296 46 L292 74" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`,
      `<svg viewBox="0 0 420 320" role="img" aria-label="營運變動插圖">
        <rect x="68" y="54" width="284" height="212" rx="26" fill="#fff"/>
        <circle cx="142" cy="128" r="38" fill="#c7d2fe"/>
        <path d="M142 104 V152 M118 128 H166" stroke="#4f46e5" stroke-width="11" stroke-linecap="round"/>
        <rect x="202" y="102" width="108" height="14" rx="7" fill="#818cf8"/>
        <rect x="202" y="130" width="76" height="10" rx="5" fill="#cbd5e1"/>
        <path d="M112 218 C150 170 188 238 224 188 C252 150 278 190 310 158" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>
      </svg>`,
      `<svg viewBox="0 0 420 320" role="img" aria-label="未來規劃插圖">
        <circle cx="210" cy="160" r="116" fill="#fff"/>
        <circle cx="210" cy="160" r="76" fill="#e0e7ff"/>
        <circle cx="210" cy="160" r="34" fill="#818cf8"/>
        <path d="M210 48 V88 M210 232 V272 M98 160 H138 M282 160 H322" stroke="#4f46e5" stroke-width="10" stroke-linecap="round"/>
        <path d="M210 160 L294 76" stroke="#0f172a" stroke-width="13" stroke-linecap="round"/>
        <path d="M269 76 H294 V101" fill="none" stroke="#0f172a" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`,
      `<svg viewBox="0 0 420 320" role="img" aria-label="風險管理插圖">
        <path d="M210 42 L330 88 V164 C330 230 280 270 210 288 C140 270 90 230 90 164 V88 Z" fill="#fff"/>
        <path d="M210 82 L292 112 V164 C292 207 261 235 210 252 C159 235 128 207 128 164 V112 Z" fill="#e0e7ff"/>
        <path d="M210 122 V180" stroke="#4f46e5" stroke-width="14" stroke-linecap="round"/>
        <circle cx="210" cy="211" r="9" fill="#4f46e5"/>
      </svg>`
    ];
    return illustrations[index % illustrations.length];
  }

  function buildReportDeck(markdown, symbol) {
    if (!markdown) {
      return `<div class="report-empty">暫無文字摘要。</div>`;
    }

    const parsed = document.createElement("div");
    parsed.innerHTML = marked.parse(markdown);
    const slides = [];
    let currentSlide = null;

    Array.from(parsed.children).forEach(node => {
      if (/^H[1-3]$/.test(node.tagName)) {
        currentSlide = {
          title: node.textContent.trim(),
          content: []
        };
        slides.push(currentSlide);
      } else {
        if (!currentSlide) {
          currentSlide = {
            title: `${symbol} 官方文件摘要`,
            content: []
          };
          slides.push(currentSlide);
        }
        currentSlide.content.push(node.outerHTML);
      }
    });

    if (slides.length === 0) {
      slides.push({
        title: `${symbol} 官方文件摘要`,
        content: [parsed.innerHTML]
      });
    }

    const slideHtml = slides.map((slide, index) => `
      <section class="report-slide ${index === 0 ? "active" : ""}" data-slide-index="${index}">
        <div class="report-slide-copy">
          <div class="report-kicker">${symbol} · Quarterly filing</div>
          <h3>${slide.title}</h3>
          <div class="report-slide-body">
            ${slide.content.join("") || "<p>本頁為報告章節封面，請繼續瀏覽下一頁。</p>"}
          </div>
        </div>
        <div class="report-visual">${getReportIllustration(index)}</div>
      </section>
    `).join("");

    const dotsHtml = slides.map((_, index) => `
      <button class="report-dot ${index === 0 ? "active" : ""}"
        type="button"
        aria-label="前往第 ${index + 1} 頁"
        onclick="showReportSlide(${index})"></button>
    `).join("");

    return `
      <div class="report-deck" id="reportDeck" data-current-slide="0">
        ${slideHtml}
        <div class="report-deck-controls">
          <div class="report-deck-nav">
            <button class="report-nav-btn" id="reportPrev" type="button" aria-label="上一頁" onclick="moveReportSlide(-1)" disabled>‹</button>
            <button class="report-nav-btn" id="reportNext" type="button" aria-label="下一頁" onclick="moveReportSlide(1)">›</button>
            <span class="report-page" id="reportPage">01 / ${String(slides.length).padStart(2, "0")}</span>
          </div>
          <div class="report-deck-dots">${dotsHtml}</div>
        </div>
      </div>
    `;
  }

  window.showReportSlide = function(index) {
    const deck = document.getElementById("reportDeck");
    if (!deck) return;

    const slides = Array.from(deck.querySelectorAll(".report-slide"));
    const dots = Array.from(deck.querySelectorAll(".report-dot"));
    const nextIndex = Math.max(0, Math.min(index, slides.length - 1));

    slides.forEach((slide, slideIndex) => slide.classList.toggle("active", slideIndex === nextIndex));
    dots.forEach((dot, dotIndex) => dot.classList.toggle("active", dotIndex === nextIndex));
    deck.dataset.currentSlide = String(nextIndex);

    document.getElementById("reportPrev").disabled = nextIndex === 0;
    document.getElementById("reportNext").disabled = nextIndex === slides.length - 1;
    document.getElementById("reportPage").textContent =
      `${String(nextIndex + 1).padStart(2, "0")} / ${String(slides.length).padStart(2, "0")}`;
  }

  window.moveReportSlide = function(direction) {
    const deck = document.getElementById("reportDeck");
    if (!deck) return;
    showReportSlide(Number(deck.dataset.currentSlide || 0) + direction);
  }

async function renderDashboards() {
    const container = document.getElementById("dashboards");

    if (tracked.length === 0 || !selectedStockId) {
      container.innerHTML = "<div style='text-align:center; color:#6b7280; padding-top:50px;'>請從左側選擇股票</div>";
      return;
    }

    const s = tracked.find(item => item.id === selectedStockId);
    if (!s) { container.innerHTML = ""; return; }

    if (s.status === "pending") {
      container.innerHTML = `
        <div class="dash-card" style="text-align:center; padding: 60px;">
          <div style="font-size:40px; margin-bottom:10px;">⏳</div>
          <h2>AI 正在分析 ${s.symbol} ...</h2>
          <p>系統正在讀取 10-Q 財報並生成摘要，請稍候約 10-20 分鐘。</p>
        </div>`;
      return;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();
    const accessToken = session?.access_token || "";
    const refreshToken = session?.refresh_token || "";

    const authenticatedUrl = s.report_url 
      ? `${s.report_url}&access_token=${accessToken}&refresh_token=${refreshToken}`
      : null;

    const summaryHtml = buildReportDeck(s.summary, s.symbol);
    
    const iframeHtml = authenticatedUrl 
      ? `<iframe src="${authenticatedUrl}"></iframe>` 
      : `<div style="text-align:center; padding:40px; background:#f9fafb; border-radius:8px;">尚未連結圖表數據</div>`;

    container.innerHTML = `
      <div class="dash-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h2>${s.symbol} 財務分析報告</h2>
          <span class="status-badge">已完成</span>
        </div>

        <div class="tab-container">
          <button id="btn-financial" class="tab-btn active" onclick="switchView('financial')">三大財報及估值分析</button>
          <button id="btn-doc" class="tab-btn" onclick="switchView('doc')">最新季度官方文件</button>
        </div>

        <div id="view-financial" class="view-section active">
          ${iframeHtml}
        </div>

        <div id="view-doc" class="view-section">
          ${summaryHtml}
        </div>
      </div>
    `;
}

  function updateAddButtonState() {
    const addBtn = document.getElementById("addBtn");
    if (tracked.length >= currentLimit) {
      addBtn.disabled = true;
      addBtn.textContent = "已達方案上限";
    } else {
      addBtn.disabled = false;
      addBtn.textContent = "新增追蹤";
    }
  }

  async function addStock() {
    const input = document.getElementById("symbolInput");
    const symbolRaw = input.value.trim().toUpperCase();
    if (!symbolRaw) return;

    if (tracked.length >= currentLimit) {
      alert(`目前方案 (${currentPlan}) 最多只能追蹤 ${currentLimit} 檔，請先移除或升級方案。`);
      return;
    }

    const { error } = await supabaseClient
      .from("tracked_stocks")
      .upsert({
        user_id: currentUser.id,
        symbol: symbolRaw,
        status: "pending", 
        summary: null
      }, { 
        onConflict: 'user_id, symbol'
      });

    if (error) {
      alert("新增/更新失敗：" + error.message);
      return;
    }

    input.value = "";
    await loadTrackedStocks();
}

  async function removeStock(id) {
    if(!confirm("確定要移除嗎？")) return;
    const { error } = await supabaseClient
      .from("tracked_stocks")
      .delete()
      .eq("id", id)
      .eq("user_id", currentUser.id);

    if (error) {
      alert("移除失敗");
      return;
    }
    await loadTrackedStocks();
  }

  document.getElementById("addBtn").addEventListener("click", addStock);
  init();
</script>
</body>
</html>
