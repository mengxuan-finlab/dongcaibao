<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>懂才抱｜財報追蹤管理</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: #f3f4f6;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: #111827;
      color: #e5e7eb;
      padding: 24px;
    }
    .sidebar h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }
    .sidebar .plan {
      font-size: 14px;
      margin-bottom: 16px;
    }
    .sidebar label {
      font-size: 14px;
      display: block;
      margin: 12px 0 4px;
    }
    .sidebar input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #111827;
      color: #f9fafb;
      box-sizing: border-box;
    }
    .sidebar button {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #4f46e5;
      color: #f9fafb;
      font-size: 14px;
      width: 100%;
    }
    .sidebar button:disabled {
      background: #6b7280;
      cursor: not-allowed;
    }
    .stock-list {
      margin-top: 16px;
      font-size: 14px;
    }
    .stock-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .stock-item:hover {
      background: #1f2937;
    }
    .stock-item.active {
      background: #1f2937;
      border-color: #4f46e5;
    }
    .stock-item .status-tag {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      margin-left: 6px;
      background: #374151;
      color: #d1d5db;
    }
    .stock-item button {
      padding: 2px 8px;
      font-size: 12px;
      background: #b91c1c;
      width: auto;
    }

    .content {
      padding: 24px;
      overflow-y: auto;
    }
    .dashboards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .dash-card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 24px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.06);
      min-height: 500px;
    }
    .dash-card h2 {
      font-size: 20px;
      margin: 0 0 16px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 12px;
    }
    
    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 10px;
    }
    .tab-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background: white;
      color: #374151;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background: #f9fafb;
    }
    .tab-btn.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }

    .view-section {
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }
    .view-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 8px;
      background: #f9fafb;
    }

    .summary-content {
      line-height: 1.8;
      color: #374151;
      font-size: 16px;
    }
    .summary-content h3 {
      color: #111827;
      margin-top: 24px;
      margin-bottom: 12px;
      border-left: 4px solid #4f46e5;
      padding-left: 10px;
      font-size: 18px;
    }
    .summary-content strong {
      color: #000;
      background-color: #f3f4f6;
      padding: 0 4px;
    }
    .summary-content ul {
      padding-left: 20px;
    }
    .summary-content li {
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      margin-bottom: 10px;
    }
    .status-badge.pending {
      background: #fff7ed;
      color: #c2410c;
    }

@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr; 
    display: block;
  }
  .sidebar {
    padding: 16px;
    border-bottom: 4px solid #4f46e5;
  }
  .stock-list {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .stock-item {
    flex: 0 0 auto;
    margin-bottom: 0;
    min-width: 120px;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px;
  }
  .stock-item button {
    margin-top: 8px;
    width: 100%;
  }
  .content {
    padding: 12px;
  }
  .dash-card {
    padding: 16px;
    min-height: auto;
  }
  .tab-container {
    flex-direction: column;
  }
  .tab-btn {
    width: 100%;
    text-align: center;
    padding: 12px;
    font-size: 16px;
  }
  iframe {
    height: 500px;
  }
  .summary-content {
    font-size: 15px;
  }
}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>財報追蹤管理</h1>
    <div class="plan">
      目前方案：<span id="planName">載入中...</span><br>
      可追蹤檔數上限：<span id="planLimit">-</span> 檔
    </div>

    <label for="symbolInput">新增追蹤股票（美股代號，例如 HIMS）</label>
    <input id="symbolInput" placeholder="輸入股票代號（英文）" />
    <button id="addBtn">新增追蹤</button>
    <div style="font-size:12px; margin-top:4px; color:#9ca3af;">Free: 1 檔、Plus: 3 檔、Pro: 5 檔</div>

    <div class="stock-list" id="stockList"></div>
  </aside>

  <main class="content">
    <div class="dashboards" id="dashboards"></div>
  </main>
</div>

<script>
  const supabaseUrl = "https://zlkexplsleznuebighte.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsa2V4cGxzbGV6bnVlYmlnaHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MzAwNjUsImV4cCI6MjA4MTAwNjA2NX0.HPVn3jcN88M4U3-RCVW-YO-b65rDOKv6pxEaVWwbm68";
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const planLimitMap = { free: 1, plus: 3, pro: 5 };

  let currentUser = null;
  let currentPlan = "free";
  let currentLimit = 1;
  let tracked = [];
  let selectedStockId = null;

  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      alert("請先登入後再使用財報追蹤功能");
      return;
    }
    currentUser = session.user;

    const { data: profile, error } = await supabaseClient
      .from("profiles")
      .select("plan")
      .eq("id", currentUser.id)
      .single();

    if (error) {
      console.error("讀取 profile 失敗，使用預設值");
      currentPlan = "free";
    } else {
      currentPlan = profile.plan || "free";
    }
    currentLimit = planLimitMap[currentPlan] || 1;

    document.getElementById("planName").textContent = currentPlan.toUpperCase();
    document.getElementById("planLimit").textContent = currentLimit;

    await loadTrackedStocks();
  }

  async function loadTrackedStocks() {
    const { data, error } = await supabaseClient
      .from("tracked_stocks")
      .select("id, symbol, status, report_url, summary")
      .eq("user_id", currentUser.id)
      .order("created_at", { ascending: true });

    if (error) {
      console.error("讀取追蹤股票失敗：", error);
      return;
    }

    tracked = data || [];

    if (tracked.length > 0) {
      if (!selectedStockId || !tracked.some(s => s.id === selectedStockId)) {
        selectedStockId = tracked[0].id;
      }
    } else {
      selectedStockId = null;
    }

    renderStockList();
    renderDashboards();
    updateAddButtonState();
  }

  function renderStockList() {
    const listEl = document.getElementById("stockList");
    if (tracked.length === 0) {
      listEl.innerHTML = "<div style='padding:10px; color:#9ca3af;'>尚未追蹤任何股票</div>";
      return;
    }
    listEl.innerHTML = tracked
      .map(s => {
        let statusText = s.status === "ready" ? "已完成" : s.status === "review" ? "審核中" : "準備中";
        const activeClass = s.id === selectedStockId ? "active" : "";

        return `
          <div class="stock-item ${activeClass}" onclick="selectStock(${s.id})">
            <span>
              ${s.symbol}
              <span class="status-tag">${statusText}</span>
            </span>
            <button onclick="event.stopPropagation(); removeStock(${s.id})">移除</button>
          </div>
        `;
      })
      .join("");
  }

  function selectStock(id) {
    selectedStockId = id;
    renderStockList();
    renderDashboards();
  }

  window.switchView = function(viewName) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${viewName}`).classList.add('active');

    document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(`view-${viewName}`).classList.add('active');
  }

async function renderDashboards() {
    const container = document.getElementById("dashboards");

    if (tracked.length === 0 || !selectedStockId) {
      container.innerHTML = "<div style='text-align:center; color:#6b7280; padding-top:50px;'>請從左側選擇股票</div>";
      return;
    }

    const s = tracked.find(item => item.id === selectedStockId);
    if (!s) { container.innerHTML = ""; return; }

    if (s.status === "pending") {
      container.innerHTML = `
        <div class="dash-card" style="text-align:center; padding: 60px;">
          <div style="font-size:40px; margin-bottom:10px;">⏳</div>
          <h2>AI 正在分析 ${s.symbol} ...</h2>
          <p>系統正在讀取 10-Q 財報並生成摘要，請稍候約 10-20 分鐘。</p>
        </div>`;
      return;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();
    const accessToken = session?.access_token || "";
    const refreshToken = session?.refresh_token || "";

    const authenticatedUrl = s.report_url 
      ? `${s.report_url}&access_token=${accessToken}&refresh_token=${refreshToken}`
      : null;

    const summaryHtml = s.summary ? marked.parse(s.summary) : "<p>暫無文字摘要。</p>";
    
    const iframeHtml = authenticatedUrl 
      ? `<iframe src="${authenticatedUrl}"></iframe>` 
      : `<div style="text-align:center; padding:40px; background:#f9fafb; border-radius:8px;">尚未連結圖表數據</div>`;

    container.innerHTML = `
      <div class="dash-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h2>${s.symbol} 財務分析報告</h2>
          <span class="status-badge">已完成</span>
        </div>

        <div class="tab-container">
          <button id="btn-financial" class="tab-btn active" onclick="switchView('financial')">三大財報及估值分析</button>
          <button id="btn-doc" class="tab-btn" onclick="switchView('doc')">最新季度官方文件</button>
        </div>

        <div id="view-financial" class="view-section active">
          ${iframeHtml}
        </div>

        <div id="view-doc" class="view-section">
          <div class="summary-content">${summaryHtml}</div>
        </div>
      </div>
    `;
}

  function updateAddButtonState() {
    const addBtn = document.getElementById("addBtn");
    if (tracked.length >= currentLimit) {
      addBtn.disabled = true;
      addBtn.textContent = "已達方案上限";
    } else {
      addBtn.disabled = false;
      addBtn.textContent = "新增追蹤";
    }
  }

  async function addStock() {
    const input = document.getElementById("symbolInput");
    const symbolRaw = input.value.trim().toUpperCase();
    if (!symbolRaw) return;

    if (tracked.length >= currentLimit) {
      alert(`目前方案 (${currentPlan}) 最多只能追蹤 ${currentLimit} 檔，請先移除或升級方案。`);
      return;
    }

    const { error } = await supabaseClient
      .from("tracked_stocks")
      .upsert({
        user_id: currentUser.id,
        symbol: symbolRaw,
        status: "pending", 
        summary: null
      }, { 
        onConflict: 'user_id, symbol'
      });

    if (error) {
      alert("新增/更新失敗：" + error.message);
      return;
    }

    input.value = "";
    await loadTrackedStocks();
}

  async function removeStock(id) {
    if(!confirm("確定要移除嗎？")) return;
    const { error } = await supabaseClient
      .from("tracked_stocks")
      .delete()
      .eq("id", id)
      .eq("user_id", currentUser.id);

    if (error) {
      alert("移除失敗");
      return;
    }
    await loadTrackedStocks();
  }

  document.getElementById("addBtn").addEventListener("click", addStock);
  init();
</script>
</body>
</html>
